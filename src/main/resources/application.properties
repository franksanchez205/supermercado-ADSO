spring.application.name=supermercado

server.error.include-stacktrace=ON_PARAM

spring.datasource.url=jdbc:postgresql://localhost:5432/supermercado
spring.datasource.username=postgres
spring.datasource.password=12345

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=9090
server.servlet.context-path=/api/v1/

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


jpa.database-platform: org.hibernate.dialect.MySQLDialect # Configuración de JPA/Hibernate (ORM)
# Dialecto para MySQL: traduce SQL a sintaxis MySQL
hibernate.ddl-auto: none # Subconfig de Hibernat
# Crear/Actualizar tablas automaticamente
show-sql: true # Mostrar SQL generado en los logs
properties: # Propiedades extras de hibernate
hibernate.format-sql: true # Formate SQL en los log para mayor legibilidad

